<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nebulapunk — Construct Based Workflow</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#070412; overflow:hidden; }
.card { position:relative; width:100%; height:100%; background:#070412; cursor:none; overflow:hidden; }
canvas { position:absolute; inset:0; pointer-events:none; }
</style>
</head>
<body>
<div class="card" id="card">
  <canvas id="cv"></canvas>
</div>
<script>
const card = document.getElementById('card');
const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');

let W, H, dots = [], t = 0;
const mouse = { x:-9999, y:-9999, inside:false };
let lensStr = 0;

const PAL = [
  [244,114,182],[167,139,250],[96,165,250],
  [220,100,200],[200,130,255],[248,180,255],
];

function rnd(a,b){ return a+(b-a)*Math.random(); }
function lerp(a,b,t){ return a+(b-a)*t; }

function resize(){
  W = cv.width  = card.offsetWidth;
  H = cv.height = card.offsetHeight;
  build();
}

function build(){
  dots = [];
  const count = Math.floor((W * H) / 900);
  for(let i = 0; i < count; i++){
    const bx = rnd(0, W), by = rnd(0, H);
    const ci = Math.floor(Math.random() * PAL.length);
    dots.push({
      x:bx, y:by, bx, by, vx:0, vy:0,
      phase:  Math.random()*Math.PI*2,
      phase2: Math.random()*Math.PI*2,
      freq:   2.5+Math.random()*5.0,
      freq2:  1.5+Math.random()*3.5,
      orbitAngle: Math.random()*Math.PI*2,
      orbitR: 15+Math.random()*90,
      orbitSpd: (Math.random()<0.5?1:-1)*(0.018+Math.random()*0.038),
      r:PAL[ci][0], g:PAL[ci][1], b:PAL[ci][2],
      size: 0.4+Math.random()*1.5,
      baseDim:    0.22+Math.random()*0.18,
      sparkleMax: 0.52+Math.random()*0.14,
    });
  }
}

function drawCursor(x, y, str){
  if(str < 0.02) return;
  const a = str;

  // outer ring: 4 clean static arcs
  const outerR = 68 * str;
  const gap = 0.32;
  const arcSpan = Math.PI/2 - gap;
  for(let i = 0; i < 4; i++){
    const start = i * (Math.PI/2) + gap/2;
    ctx.beginPath();
    ctx.arc(x, y, outerR, start, start + arcSpan);
    ctx.strokeStyle = `rgba(244,114,182,${a * 0.4})`;
    ctx.lineWidth = 0.8; ctx.stroke();
  }

  // counter-rotating mid ring with tick marks
  const midR = 50 * str;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(-t * 0.65);
  ctx.beginPath();
  ctx.arc(0, 0, midR, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(180,130,255,${a * 0.25})`;
  ctx.lineWidth = 0.8; ctx.stroke();
  for(let i = 0; i < 12; i++){
    const ang = (i/12)*Math.PI*2;
    const isLong = i%3===0;
    const inner = midR-(isLong?7:4);
    ctx.beginPath();
    ctx.moveTo(Math.cos(ang)*inner,    Math.sin(ang)*inner);
    ctx.lineTo(Math.cos(ang)*(midR+1), Math.sin(ang)*(midR+1));
    ctx.strokeStyle = `rgba(220,160,255,${a*(isLong?0.8:0.4)})`;
    ctx.lineWidth = isLong?1.2:0.7; ctx.stroke();
  }
  ctx.restore();

  // 4 corner bracket chevrons
  const bktR = 38 * str;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(t * 0.25);
  for(let i = 0; i < 4; i++){
    const ang = (i/4)*Math.PI*2 + Math.PI/4;
    const bx2 = Math.cos(ang)*bktR, by2 = Math.sin(ang)*bktR;
    ctx.save();
    ctx.translate(bx2, by2);
    ctx.rotate(ang+Math.PI/4);
    ctx.beginPath();
    ctx.moveTo(-5,-2); ctx.lineTo(-5,-5); ctx.lineTo(-2,-5);
    ctx.strokeStyle = `rgba(244,114,182,${a*0.9})`;
    ctx.lineWidth = 1.2; ctx.stroke();
    ctx.restore();
  }
  ctx.restore();

  // inner spinning arcs
  for(let i = 0; i < 5; i++){
    const ang = t*0.75 + i*(Math.PI*2/5);
    ctx.beginPath();
    ctx.arc(x, y, 28*str, ang, ang+0.75);
    ctx.strokeStyle = `rgba(220,140,255,${a*0.5})`;
    ctx.lineWidth = 1.2; ctx.stroke();
  }
  for(let i = 0; i < 3; i++){
    const ang = -t*1.1 + i*(Math.PI*2/3);
    ctx.beginPath();
    ctx.arc(x, y, 18*str, ang, ang+1.1);
    ctx.strokeStyle = `rgba(244,114,182,${a*0.4})`;
    ctx.lineWidth = 0.8; ctx.stroke();
  }

  // core glow
  const cg = ctx.createRadialGradient(x, y, 0, x, y, 22*str);
  cg.addColorStop(0, `rgba(244,114,182,${a*0.25})`);
  cg.addColorStop(0.5, `rgba(167,139,250,${a*0.1})`);
  cg.addColorStop(1, 'rgba(167,139,250,0)');
  ctx.beginPath(); ctx.arc(x, y, 22*str, 0, Math.PI*2);
  ctx.fillStyle = cg; ctx.fill();

  // center dot
  ctx.beginPath(); ctx.arc(x, y, 2.5*str, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,210,255,${a*0.95})`;
  ctx.fill();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  t += 0.016;

  lensStr = mouse.inside
    ? Math.min(1, lensStr+0.045)
    : Math.max(0, lensStr-0.045);

  const lensX = mouse.x, lensY = mouse.y;
  const captureR = 140*lensStr;

  for(const d of dots){
    const raw1    = Math.sin(t*d.freq +d.phase) *0.5+0.5;
    const raw2    = Math.sin(t*d.freq2+d.phase2)*0.5+0.5;
    const sparkle = Math.pow(raw1*raw2, 0.25);

    let boost = 0;
    if(lensStr>0){
      const dx=d.bx-lensX, dy=d.by-lensY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<captureR){
        boost=Math.pow(1-dist/captureR,1.8)*lensStr;
        const targetR=Math.max(12,dist*0.28+d.orbitR*0.08)*lensStr;
        const toX=lensX+Math.cos(d.orbitAngle)*targetR-d.x;
        const toY=lensY+Math.sin(d.orbitAngle)*targetR-d.y;
        d.vx+=toX*0.09*boost; d.vy+=toY*0.09*boost;
        d.orbitAngle+=d.orbitSpd*lensStr;
      }
    }

    d.vx+=(d.bx-d.x)*0.032; d.vy+=(d.by-d.y)*0.032;
    d.vx*=0.78; d.vy*=0.78;
    d.x+=d.vx; d.y+=d.vy;

    const idleAlpha  = d.baseDim + sparkle*d.sparkleMax;
    const hoverAlpha = d.baseDim + sparkle*d.sparkleMax*0.4 + boost*0.95;
    const alpha = Math.min(1, lerp(idleAlpha, hoverAlpha, lensStr));
    const sz = d.size + sparkle*0.8 + boost*3.2;
    const rc = Math.round(lerp(d.r,255,boost*0.35));
    const gc = Math.round(lerp(d.g,255,boost*0.12));
    const bc = Math.round(lerp(d.b,255,boost*0.35));

    if(sparkle>0.72){
      const ps=(sparkle-0.72)/0.28;
      const gr=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,sz*5);
      gr.addColorStop(0,`rgba(${d.r},${d.g},${d.b},${ps*0.28})`);
      gr.addColorStop(1,`rgba(${d.r},${d.g},${d.b},0)`);
      ctx.beginPath();ctx.arc(d.x,d.y,sz*5,0,Math.PI*2);
      ctx.fillStyle=gr;ctx.fill();
    }
    if(boost>0.28){
      const gr=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,sz*5.5);
      gr.addColorStop(0,`rgba(${rc},${gc},${bc},${boost*0.22})`);
      gr.addColorStop(1,`rgba(${rc},${gc},${bc},0)`);
      ctx.beginPath();ctx.arc(d.x,d.y,sz*5.5,0,Math.PI*2);
      ctx.fillStyle=gr;ctx.fill();
    }
    ctx.beginPath();ctx.arc(d.x,d.y,sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(${rc},${gc},${bc},${alpha})`;
    ctx.fill();
  }

  drawCursor(lensX, lensY, lensStr);
  requestAnimationFrame(draw);
}

card.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
});
card.addEventListener('mouseenter',()=>mouse.inside=true);
card.addEventListener('mouseleave',()=>{
  mouse.inside=false; mouse.x=-9999; mouse.y=-9999;
});

window.addEventListener('resize',resize);
resize(); draw();
</script>
</body>
</html>
