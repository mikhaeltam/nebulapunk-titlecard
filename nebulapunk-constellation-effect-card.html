<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nebulapunk — Constellation</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#070412; overflow:hidden; }
.card { position:relative; width:100%; height:100%; background:#070412; cursor:none; overflow:hidden; }
canvas { position:absolute; inset:0; pointer-events:none; }
</style>
</head>
<body>
<div class="card" id="card">
  <canvas id="cv"></canvas>
</div>
<script>
const card = document.getElementById('card');
const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');

let W, H, dots = [], t = 0;
const mouse = { x:-9999, y:-9999, inside:false };
let hoverStr = 0;

const PAL = [
  [176, 96,255],
  [ 96,165,250],
  [192,132,252],
  [ 34,211,238],
  [244,114,182],
];

function rnd(a,b){ return a+(b-a)*Math.random(); }
function lerp3(a,b,t){ return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t]; }
function lerp(a,b,t){ return a+(b-a)*t; }

function resize(){
  W = cv.width  = card.offsetWidth;
  H = cv.height = card.offsetHeight;
  build();
}

function build(){
  dots = [];
  const count = Math.floor((W * H) / 1400);
  for(let i=0; i<count; i++){
    const bx = rnd(0, W), by = rnd(0, H);
    const ci = Math.floor(Math.random()*PAL.length);
    dots.push({
      x:bx, y:by, bx, by,
      vx:0, vy:0,
      phase:  Math.random()*Math.PI*2,
      phase2: Math.random()*Math.PI*2,
      freq:   2.0+Math.random()*4.0,
      freq2:  1.2+Math.random()*3.0,
      cp:     Math.random()*Math.PI*2,
      cs:     0.003+Math.random()*0.005,
      size:   0.8+Math.random()*2.2,
      baseDim:    0.20+Math.random()*0.16,
      sparkleMax: 0.48+Math.random()*0.14,
      r:PAL[ci][0], g:PAL[ci][1], b:PAL[ci][2],
    });
  }
}

function getColor(d, boost){
  const p=PAL;
  const f=((d.cp)%(Math.PI*2))/(Math.PI*2);
  const i1=Math.floor(f*p.length)%p.length;
  const i2=(i1+1)%p.length;
  let c=lerp3(p[i1],p[i2],f*p.length-i1);
  if(boost>0) c=lerp3(c,[255,255,255],boost*0.5);
  return c;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  t+=0.016;

  hoverStr = mouse.inside
    ? Math.min(1, hoverStr+0.05)
    : Math.max(0, hoverStr-0.05);

  const near=[];

  for(const d of dots){
    d.cp+=d.cs;
    const raw1=Math.sin(t*d.freq +d.phase) *0.5+0.5;
    const raw2=Math.sin(t*d.freq2+d.phase2)*0.5+0.5;
    const sparkle=Math.pow(raw1*raw2,0.25);

    let boost=0;
    if(mouse.inside){
      const dx=d.x-mouse.x, dy=d.y-mouse.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<160){ boost=Math.pow(1-dist/160,2); near.push({d,dist}); }
    }

    d.vx+=(d.bx-d.x)*0.03; d.vy+=(d.by-d.y)*0.03;
    d.vx*=0.82; d.vy*=0.82;
    d.x+=d.vx; d.y+=d.vy;

    const idleAlpha  = d.baseDim + sparkle*d.sparkleMax;
    const hoverAlpha = d.baseDim + sparkle*d.sparkleMax*0.3 + boost*0.95;
    const alpha=Math.min(1, lerp(idleAlpha, hoverAlpha, hoverStr));

    const sz=d.size+sparkle*0.5+boost*2.5;
    const [r,g,b]=getColor(d,boost*hoverStr);
    const rc=Math.round(r),gc=Math.round(g),bc=Math.round(b);

    if(sparkle>0.72&&boost<0.1){
      const ps=(sparkle-0.72)/0.28;
      const gr=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,sz*4.5);
      gr.addColorStop(0,`rgba(${d.r},${d.g},${d.b},${ps*0.25})`);
      gr.addColorStop(1,`rgba(${d.r},${d.g},${d.b},0)`);
      ctx.beginPath();ctx.arc(d.x,d.y,sz*4.5,0,Math.PI*2);
      ctx.fillStyle=gr;ctx.fill();
    }

    if(boost>0.2){
      const gr=ctx.createRadialGradient(d.x,d.y,0,d.x,d.y,sz*6);
      gr.addColorStop(0,`rgba(${rc},${gc},${bc},${boost*hoverStr*0.35})`);
      gr.addColorStop(1,`rgba(${rc},${gc},${bc},0)`);
      ctx.beginPath();ctx.arc(d.x,d.y,sz*6,0,Math.PI*2);
      ctx.fillStyle=gr;ctx.fill();
    }

    ctx.beginPath();ctx.arc(d.x,d.y,sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(${rc},${gc},${bc},${alpha})`;
    ctx.fill();

    if(boost>0.5){
      ctx.beginPath();ctx.arc(d.x,d.y,sz*1.8,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${rc},${gc},${bc},${boost*hoverStr*0.4})`;
      ctx.lineWidth=0.8;ctx.stroke();
    }
  }

  // constellation web
  if(near.length>1){
    near.sort((a,b)=>a.dist-b.dist);
    const top=near.slice(0,28);

    for(let i=0;i<top.length;i++){
      for(let j=i+1;j<top.length;j++){
        const a=top[i].d, b=top[j].d;
        const dx=a.x-b.x, dy=a.y-b.y;
        const seg=Math.sqrt(dx*dx+dy*dy);
        if(seg<95){
          const str2=(1-seg/95)*((1-top[i].dist/160)+(1-top[j].dist/160))*0.5;
          const lineAlpha=str2*(0.35+hoverStr*0.45);
          const lineW=str2*(1.2+hoverStr*1.2);
          const [r,g,b2]=getColor(a,0);
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
          ctx.strokeStyle=`rgba(${Math.round(r)},${Math.round(g)},${Math.round(b2)},${lineAlpha})`;
          ctx.lineWidth=lineW;ctx.stroke();
          if(hoverStr>0.3){
            ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
            ctx.strokeStyle=`rgba(${Math.round(r)},${Math.round(g)},${Math.round(b2)},${str2*hoverStr*0.2})`;
            ctx.lineWidth=lineW*4;ctx.stroke();
          }
        }
      }
      const d=top[i].d;
      if(top[i].dist<85){
        const str2=(1-top[i].dist/85);
        const [r,g,b2]=getColor(d,0);
        ctx.beginPath();ctx.moveTo(mouse.x,mouse.y);ctx.lineTo(d.x,d.y);
        ctx.strokeStyle=`rgba(${Math.round(r)},${Math.round(g)},${Math.round(b2)},${str2*(0.3+hoverStr*0.5)})`;
        ctx.lineWidth=str2*(1.5+hoverStr*1.5);ctx.stroke();
      }
    }
  }

  requestAnimationFrame(draw);
}

card.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
});
card.addEventListener('mouseenter',()=>mouse.inside=true);
card.addEventListener('mouseleave',()=>{
  mouse.inside=false; mouse.x=-9999; mouse.y=-9999;
});

window.addEventListener('resize',resize);
resize(); draw();
</script>
</body>
</html>
