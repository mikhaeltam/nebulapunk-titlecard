<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nebulapunk — Voxel Terrain Lite</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#070412; overflow:hidden; }
.card { position:relative; width:100%; height:100%; background:#070412; cursor:none; overflow:hidden; }
canvas { position:absolute; inset:0; pointer-events:none; }
</style>
</head>
<body>
<div class="card" id="card">
  <canvas id="cv"></canvas>
</div>
<script>
const card = document.getElementById('card');
const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');

// Pre-baked color cache to avoid per-frame string allocations
const COLOR_CACHE = {};

let W, H, t = 0;
let cols, rows, cellW, cellH;
let heights, targetHeights;
const mouse = { x:-9999, y:-9999, inside:false };

const ISO_ANGLE = 26;
const ISO_RAD   = ISO_ANGLE * Math.PI / 180;
const MAX_H     = 90;
const LERP_SPD  = 0.10;

// Precomputed iso projection cache (invalidated on resize)
let projCache = null;

function lerp(a,b,t){ return a+(b-a)*t; }

function noise(x, y, t2){
  // Same noise, but only 3 terms instead of 4 — one less sin call per voxel
  return (
    Math.sin(x * 0.8 + t2 * 0.6) * 0.45 +
    Math.sin(y * 0.6 + t2 * 0.4) * 0.35 +
    Math.sin((x + y) * 0.5 + t2 * 0.7) * 0.20
  );
}

function resize(){
  W = cv.width  = card.offsetWidth;
  H = cv.height = card.offsetHeight;
  build();
}

function build(){
  // ~Half the voxels: 20×12 vs original 38×22
  cols = 20;
  rows = 12;
  cellW = (W * 0.85) / cols;
  cellH = (H * 0.55) / rows;
  heights       = new Float32Array(cols * rows);
  targetHeights = new Float32Array(cols * rows);

  // Pre-bake all (c,r) base projections — only recomputed on resize
  projCache = new Float32Array(cols * rows * 2);
  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){
      const ox = W * 0.5;
      const oy = H * 0.72;
      const ix = (c - cols/2) * cellW + (r - rows/2) * cellW * 0.5;
      const iy = (r - rows/2) * cellH * Math.cos(ISO_RAD);
      const base = (r * cols + c) * 2;
      projCache[base]   = ox + ix + (c - cols/2) * cellH * 0.28; // x without height offset (height added per-frame)
      projCache[base+1] = oy + iy;                                 // y base (subtract h for actual y)
    }
  }
}

// Fast iso: uses pre-baked cache + height offset
// Returns into a reusable point object to avoid GC
const _pt = {x:0,y:0};
function isoFast(c, r, h, pt){
  const base = (r * cols + c) * 2;
  pt.x = projCache[base];
  pt.y = projCache[base+1] - h;
  return pt;
}

// Separate point objects per corner to avoid allocation inside drawVoxel
const PT_TL  = {x:0,y:0}, PT_TR  = {x:0,y:0};
const PT_BL  = {x:0,y:0}, PT_BR  = {x:0,y:0};
const PT_TL0 = {x:0,y:0}, PT_TR0 = {x:0,y:0};
const PT_BL0 = {x:0,y:0}, PT_BR0 = {x:0,y:0};

function getColor(normQ, side){
  // normQ: quantised 0..15 to limit cache size
  const key = normQ * 3 + (side === 'top' ? 0 : side === 'right' ? 1 : 2);
  if(COLOR_CACHE[key]) return COLOR_CACHE[key];
  const norm = normQ / 15;
  const r = Math.floor(lerp(30,  80,  norm));
  const g = Math.floor(lerp(10, 180,  norm));
  const b = Math.floor(lerp(80, 255,  norm));
  const f = side === 'top' ? 1.0 : side === 'right' ? 0.55 : 0.38;
  const col = `rgb(${Math.round(r*f)},${Math.round(g*f)},${Math.round(b*f)})`;
  COLOR_CACHE[key] = col;
  return col;
}

function drawVoxel(c, r, h){
  if(h < 1) return;
  const norm  = h / MAX_H;
  const normQ = Math.min(15, Math.floor(norm * 15));

  // clamp corners to grid boundaries
  const c1 = Math.min(c+1, cols), r1 = Math.min(r+1, rows);

  isoFast(c,  r,  h, PT_TL);  isoFast(c1, r,  h, PT_TR);
  isoFast(c,  r1, h, PT_BL);  isoFast(c1, r1, h, PT_BR);
  isoFast(c,  r,  0, PT_TL0); isoFast(c1, r,  0, PT_TR0);
  isoFast(c,  r1, 0, PT_BL0); isoFast(c1, r1, 0, PT_BR0);

  // left face
  ctx.beginPath();
  ctx.moveTo(PT_TL.x,  PT_TL.y);
  ctx.lineTo(PT_BL.x,  PT_BL.y);
  ctx.lineTo(PT_BL0.x, PT_BL0.y);
  ctx.lineTo(PT_TL0.x, PT_TL0.y);
  ctx.closePath();
  ctx.fillStyle = getColor(normQ, 'left');
  ctx.fill();

  // right face
  ctx.beginPath();
  ctx.moveTo(PT_TR.x,  PT_TR.y);
  ctx.lineTo(PT_BR.x,  PT_BR.y);
  ctx.lineTo(PT_BR0.x, PT_BR0.y);
  ctx.lineTo(PT_TR0.x, PT_TR0.y);
  ctx.closePath();
  ctx.fillStyle = getColor(normQ, 'right');
  ctx.fill();

  // top face
  ctx.beginPath();
  ctx.moveTo(PT_TL.x, PT_TL.y);
  ctx.lineTo(PT_TR.x, PT_TR.y);
  ctx.lineTo(PT_BR.x, PT_BR.y);
  ctx.lineTo(PT_BL.x, PT_BL.y);
  ctx.closePath();
  ctx.fillStyle = getColor(normQ, 'top');
  ctx.fill();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  t += 0.016;

  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){
      const idx = r*cols+c;
      let target = (noise(c*0.18, r*0.22, t) * 0.5 + 0.5) * MAX_H * 0.45;

      if(mouse.inside){
        const base = (r * cols + c) * 2;
        const px = projCache[base];
        const py = projCache[base+1];
        const dx = px - mouse.x, dy = py - mouse.y;
        const dist2 = dx*dx + dy*dy;
        const rad = 130;
        if(dist2 < rad*rad){
          const pull = Math.pow(1 - Math.sqrt(dist2)/rad, 2);
          target += pull * MAX_H * 0.85;
        }
      }

      targetHeights[idx] = target;
      heights[idx] = lerp(heights[idx], target, LERP_SPD);
    }
  }

  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){
      drawVoxel(c, r, heights[r*cols+c]);
    }
  }

  // Minimal ground grid — only every other line
  ctx.strokeStyle = 'rgba(0,150,200,0.05)';
  ctx.lineWidth = 0.5;
  for(let r=0; r<=rows; r+=2){
    const ax = projCache[r*cols*2], ay = projCache[r*cols*2+1];
    const bIdx = (r*cols + cols-1)*2;
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(projCache[bIdx], projCache[bIdx+1]); ctx.stroke();
  }
  for(let c=0; c<=cols; c+=2){
    const aIdx = c*2, bIdx = ((rows-1)*cols+c)*2;
    ctx.beginPath();
    ctx.moveTo(projCache[aIdx], projCache[aIdx+1]);
    ctx.lineTo(projCache[bIdx], projCache[bIdx+1]);
    ctx.stroke();
  }

  requestAnimationFrame(draw);
}

card.addEventListener('mousemove',e=>{
  const r=card.getBoundingClientRect();
  mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
});
card.addEventListener('mouseenter',()=>mouse.inside=true);
card.addEventListener('mouseleave',()=>{
  mouse.inside=false; mouse.x=-9999; mouse.y=-9999;
});

window.addEventListener('resize',resize);
resize(); draw();
</script>
</body>
</html>
