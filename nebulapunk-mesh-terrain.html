<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nebulapunk — Mesh Terrain</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#060310; overflow:hidden; }
.card { position:relative; width:100%; height:100%; background:#060310; cursor:none; overflow:hidden; }
canvas { position:absolute; inset:0; pointer-events:none; }
</style>
</head>
<body>
<div class="card" id="card">
  <canvas id="cv"></canvas>
</div>
<script>
const card = document.getElementById('card');
const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');

let W, H, t = 0;
let cols, rows, cellW, cellH;
let heights, targetHeights;
const mouse = { x:-9999, y:-9999, inside:false };

const ISO_ANGLE = 26;
const ISO_RAD   = ISO_ANGLE * Math.PI / 180;
const MAX_H     = 110;
const LERP_SPD  = 0.10;
const TWO_PI    = Math.PI * 2;

let vx, vy;

// ─────────────────────────────────────────────────────────────────────────────
// PARALLAX STARFIELD — 3 layers at different depths
// Layer 0: far, tiny, slow drift
// Layer 1: mid, standard
// Layer 2: near, slightly larger, faster drift
// ─────────────────────────────────────────────────────────────────────────────
const LAYER_CFG = [
  { count:90,  maxY:0.62, rChance:0.05, rBig:1.0, rSml:0.5, baseMin:0.10, baseMax:0.25, drift:0.008, flickRate:220 },
  { count:70,  maxY:0.58, rChance:0.14, rBig:1.5, rSml:1.0, baseMin:0.22, baseMax:0.45, drift:0.018, flickRate:150 },
  { count:25,  maxY:0.48, rChance:0.30, rBig:2.0, rSml:1.2, baseMin:0.30, baseMax:0.55, drift:0.032, flickRate:100 },
];

let starLayers = [[], [], []];

function buildStars(){
  starLayers = [[], [], []];
  LAYER_CFG.forEach((cfg, li) => {
    for(let i = 0; i < cfg.count; i++){
      starLayers[li].push({
        x:    Math.random() * W,
        y:    Math.random() * H * cfg.maxY,
        r:    Math.random() < cfg.rChance ? cfg.rBig : cfg.rSml,
        base: cfg.baseMin + Math.random() * (cfg.baseMax - cfg.baseMin),
        flicker: 0,
        flickerTimer: Math.floor(Math.random() * cfg.flickRate),
        tint: i % 3,   // 0=white 1=pink 2=blue
        ox: Math.random() * W  // origin x for drift offset
      });
    }
  });
}

function drawStars(){
  LAYER_CFG.forEach((cfg, li) => {
    const layer = starLayers[li];
    for(let i = 0; i < layer.length; i++){
      const s = layer[i];
      // Gentle horizontal parallax drift
      const sx = (s.x + t * cfg.drift * 30) % W;
      s.flickerTimer--;
      if(s.flickerTimer <= 0){
        s.flicker = 1.0;
        s.flickerTimer = cfg.flickRate + Math.floor(Math.random() * cfg.flickRate);
      }
      if(s.flicker > 0) s.flicker = Math.max(0, s.flicker - 0.045);
      const a = Math.min(1, s.base + s.flicker * 0.8);
      ctx.fillStyle = s.tint === 0 ? `rgba(255,255,255,${a.toFixed(2)})`
                    : s.tint === 1 ? `rgba(255,175,255,${a.toFixed(2)})`
                                   : `rgba(175,210,255,${a.toFixed(2)})`;
      ctx.fillRect(sx, s.y, s.r, s.r);
    }
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// DISTANT GALAXY SMUDGE — one faint elongated ellipse in sky
// ─────────────────────────────────────────────────────────────────────────────
function drawGalaxySmudge(){
  const gx = W * 0.68, gy = H * 0.14;
  ctx.save();
  ctx.translate(gx, gy);
  ctx.rotate(-0.38);  // slight tilt
  ctx.scale(2.6, 1);  // stretch horizontally to make ellipse
  const gr = ctx.createRadialGradient(0, 0, 0, 0, 0, W * 0.11);
  gr.addColorStop(0,    'rgba(200,160,255,0.09)');
  gr.addColorStop(0.35, 'rgba(160,100,220,0.05)');
  gr.addColorStop(0.7,  'rgba(100,60,180,0.02)');
  gr.addColorStop(1,    'rgba(0,0,0,0)');
  ctx.fillStyle = gr;
  ctx.beginPath();
  ctx.arc(0, 0, W * 0.11, 0, TWO_PI);
  ctx.fill();
  ctx.restore();

  // Tiny bright core of the galaxy
  ctx.fillStyle = 'rgba(230,200,255,0.22)';
  ctx.fillRect(gx - 1, gy - 0.5, 2, 1);
}

// ─────────────────────────────────────────────────────────────────────────────
// NEBULA COLOR WASH — drifting blobs
// ─────────────────────────────────────────────────────────────────────────────
function drawNebulaWash(){
  const b1x = W * (0.25 + Math.sin(t * 0.07) * 0.12);
  const b1y = H * (0.28 + Math.sin(t * 0.05) * 0.08);
  const g1 = ctx.createRadialGradient(b1x, b1y, 0, b1x, b1y, W * 0.40);
  g1.addColorStop(0,   'rgba(150,35,195,0.14)');
  g1.addColorStop(0.5, 'rgba(90,18,150,0.07)');
  g1.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);

  const b2x = W * (0.74 + Math.sin(t * 0.06 + 1.2) * 0.10);
  const b2y = H * (0.20 + Math.sin(t * 0.08 + 0.5) * 0.07);
  const g2 = ctx.createRadialGradient(b2x, b2y, 0, b2x, b2y, W * 0.30);
  g2.addColorStop(0,   'rgba(35,75,215,0.12)');
  g2.addColorStop(0.5, 'rgba(18,45,155,0.06)');
  g2.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

  const b3x = W * (0.48 + Math.sin(t * 0.04 + 2.5) * 0.14);
  const b3y = H * (0.16 + Math.sin(t * 0.09) * 0.06);
  const g3 = ctx.createRadialGradient(b3x, b3y, 0, b3x, b3y, W * 0.20);
  g3.addColorStop(0,   'rgba(215,28,135,0.09)');
  g3.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.fillStyle = g3; ctx.fillRect(0, 0, W, H);
}

// ─────────────────────────────────────────────────────────────────────────────
// HORIZON GLOW
// ─────────────────────────────────────────────────────────────────────────────
let horizonGrad = null;
function buildHorizon(){
  const hy = H * 0.68;
  horizonGrad = ctx.createLinearGradient(0, hy - H*0.10, 0, hy + H*0.06);
  horizonGrad.addColorStop(0,   'rgba(0,0,0,0)');
  horizonGrad.addColorStop(0.4, 'rgba(120,40,200,0.20)');
  horizonGrad.addColorStop(0.6, 'rgba(180,60,255,0.11)');
  horizonGrad.addColorStop(1,   'rgba(0,0,0,0)');
}
function drawHorizon(){
  ctx.fillStyle = horizonGrad;
  ctx.fillRect(0, H * 0.56, W, H * 0.24);
}

// ─────────────────────────────────────────────────────────────────────────────
// GROUND FOG — haze sitting just below the mesh horizon
// ─────────────────────────────────────────────────────────────────────────────
let fogGrad = null;
function buildFog(){
  const fy = H * 0.72;
  fogGrad = ctx.createLinearGradient(0, fy - H*0.04, 0, fy + H*0.10);
  fogGrad.addColorStop(0,    'rgba(0,0,0,0)');
  fogGrad.addColorStop(0.25, 'rgba(80,20,140,0.18)');
  fogGrad.addColorStop(0.55, 'rgba(50,10,100,0.28)');
  fogGrad.addColorStop(1,    'rgba(6,3,16,0.55)');
}
function drawFog(){
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, H * 0.68, W, H * 0.32);
}

// ─────────────────────────────────────────────────────────────────────────────
// MOUSE RIPPLE RINGS
// ─────────────────────────────────────────────────────────────────────────────
let rings = [], ringTimer = 0;
function drawRings(){
  ringTimer++;
  if(ringTimer >= 22 && mouse.inside){ ringTimer = 0; rings.push({ x:mouse.x, y:mouse.y, r:0, life:1.0 }); }
  for(let i = rings.length - 1; i >= 0; i--){
    const rg = rings[i];
    rg.r += 3.2; rg.life -= 0.032;
    if(rg.life <= 0){ rings.splice(i,1); continue; }
    ctx.strokeStyle = `rgba(200,140,255,${(rg.life*0.5).toFixed(2)})`;
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(rg.x, rg.y, rg.r, 0, TWO_PI); ctx.stroke();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// EDGE PULSE WAVE
// ─────────────────────────────────────────────────────────────────────────────
let pulsePhase = 0;
const PULSE_SPEED = 0.018, PULSE_WIDTH = 6.0;
function getPulseBoost(c, r){
  const pos = c + r * 0.6, total = cols + rows * 0.6;
  const wave = pulsePhase % total;
  const d = Math.min(Math.abs(pos - wave), total - Math.abs(pos - wave));
  if(d > PULSE_WIDTH) return 0;
  return Math.pow(1 - d / PULSE_WIDTH, 2) * 0.7;
}

// ─────────────────────────────────────────────────────────────────────────────
// HUD TEXT OVERLAY
// ─────────────────────────────────────────────────────────────────────────────
const HUD_TL = ['SYS.MESH // ACTIVE', 'VTX: 29×17', 'RENDER: ISO-26°'];
const HUD_BR = ['NEBULAPUNK.OS v2.4', 'GRID: STABLE', '∆H: LIVE'];
let hudFlicker = new Float32Array(HUD_TL.length + HUD_BR.length).fill(1);
let hudTimer = 0;
function drawHUD(){
  hudTimer++;
  if(hudTimer % 90 === 0) hudFlicker[Math.floor(Math.random()*hudFlicker.length)] = 0.15 + Math.random()*0.4;
  for(let i=0;i<hudFlicker.length;i++) if(hudFlicker[i]<1) hudFlicker[i]=Math.min(1,hudFlicker[i]+0.06);
  ctx.font = '10px monospace';
  const pad = 16;
  HUD_TL.forEach((txt, i) => {
    ctx.fillStyle = `rgba(180,140,255,${(0.28*hudFlicker[i]).toFixed(2)})`;
    ctx.fillText(txt, pad, pad + 14 + i*15);
  });
  HUD_BR.forEach((txt, i) => {
    ctx.fillStyle = `rgba(200,160,255,${(0.28*hudFlicker[HUD_TL.length+i]).toFixed(2)})`;
    ctx.fillText(txt, W - pad - ctx.measureText(txt).width, H - pad - (HUD_BR.length-1-i)*15);
  });
  if(mouse.inside){
    ctx.fillStyle = 'rgba(255,180,255,0.38)';
    ctx.fillText(`X:${String(mouse.x.toFixed(0)).padStart(4,'0')} Y:${String(mouse.y.toFixed(0)).padStart(4,'0')}`, mouse.x+14, mouse.y-8);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// NEBULA VIGNETTE
// ─────────────────────────────────────────────────────────────────────────────
let vignetteGrad = null;
function buildVignette(){
  vignetteGrad = ctx.createRadialGradient(W*0.5,H*0.5,H*0.08,W*0.5,H*0.5,H*0.92);
  vignetteGrad.addColorStop(0,    'rgba(0,0,0,0)');
  vignetteGrad.addColorStop(0.45, 'rgba(8,2,22,0.22)');
  vignetteGrad.addColorStop(1,    'rgba(4,0,14,0.92)');
}
function drawVignette(){ ctx.fillStyle=vignetteGrad; ctx.fillRect(0,0,W,H); }

// ─────────────────────────────────────────────────────────────────────────────
// CORE MESH
// ─────────────────────────────────────────────────────────────────────────────
function lerp(a,b,t){ return a+(b-a)*t; }
function noise(x,y,t2){
  return Math.sin(x*0.8+t2*0.6)*0.45 + Math.sin(y*0.6+t2*0.4)*0.35 + Math.sin((x+y)*0.5+t2*0.7)*0.20;
}
function edgeColor(norm, alpha, pulse){
  const r  = Math.min(255, Math.round(lerp(60,255,norm) + norm*norm*60));
  const g  = Math.round(lerp(20,60,norm));
  const b  = Math.round(lerp(200,180,norm));
  const a  = Math.min(1, alpha + pulse*0.6);
  return `rgba(${Math.min(255,r+Math.round(pulse*80))},${Math.min(255,g+Math.round(pulse*120))},${Math.min(255,b+Math.round(pulse*60))},${a.toFixed(2)})`;
}

function resize(){
  W = cv.width  = card.offsetWidth;
  H = cv.height = card.offsetHeight;
  build();
}

function build(){
  cols=28; rows=16;
  cellW=(W*0.88)/cols; cellH=(H*0.52)/rows;
  const vCount=(cols+1)*(rows+1);
  heights=new Float32Array(vCount); targetHeights=new Float32Array(vCount);
  vx=new Float32Array(vCount); vy=new Float32Array(vCount);
  buildStars(); buildVignette(); buildHorizon(); buildFog();
}

function project(){
  const ox=W*0.5, oy=H*0.70;
  for(let r=0;r<=rows;r++) for(let c=0;c<=cols;c++){
    const idx=r*(cols+1)+c;
    const ix=(c-cols/2)*cellW+(r-rows/2)*cellW*0.5;
    const iy=(r-rows/2)*cellH*Math.cos(ISO_RAD);
    vx[idx]=ox+ix+(c-cols/2)*cellH*0.28;
    vy[idx]=oy+iy-heights[idx];
  }
}

function drawMesh(){
  pulsePhase+=PULSE_SPEED;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const i00=r*(cols+1)+c, i10=i00+1, i01=(r+1)*(cols+1)+c, i11=i01+1;
    const h00=heights[i00],h10=heights[i10],h01=heights[i01],h11=heights[i11];
    const nA=((h00+h10+h01)/3)/MAX_H, nB=((h10+h11+h01)/3)/MAX_H;
    const pulse=getPulseBoost(c,r);
    ctx.lineWidth=0.7+pulse*0.8;

    ctx.beginPath();
    ctx.moveTo(vx[i00],vy[i00]); ctx.lineTo(vx[i10],vy[i10]); ctx.lineTo(vx[i01],vy[i01]);
    ctx.closePath();
    ctx.strokeStyle=edgeColor(nA,0.18+nA*0.55,pulse); ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(vx[i10],vy[i10]); ctx.lineTo(vx[i11],vy[i11]); ctx.lineTo(vx[i01],vy[i01]);
    ctx.closePath();
    ctx.strokeStyle=edgeColor(nB,0.18+nB*0.55,pulse); ctx.stroke();
  }
}

function drawVertices(){
  for(let r=0;r<=rows;r++) for(let c=0;c<=cols;c++){
    const idx=r*(cols+1)+c;
    const norm=heights[idx]/MAX_H;
    if(norm<0.02) continue;
    const x=vx[idx], y=vy[idx];
    const dotR=0.8+norm*2.2, alpha=0.35+norm*0.65, pulse=getPulseBoost(c,r);
    const glow=ctx.createRadialGradient(x,y,0,x,y,dotR*3.5);
    glow.addColorStop(0, norm>0.6
      ? `rgba(255,150,230,${(alpha*0.35+pulse*0.25).toFixed(2)})`
      : `rgba(140,100,255,${(alpha*0.30+pulse*0.20).toFixed(2)})`);
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,dotR*3.5,0,TWO_PI); ctx.fill();
    const coreA=Math.min(1,alpha+pulse*0.5);
    ctx.fillStyle=norm>0.6?`rgba(255,210,255,${coreA.toFixed(2)})`:`rgba(190,165,255,${coreA.toFixed(2)})`;
    ctx.beginPath(); ctx.arc(x,y,dotR+pulse*1.2,0,TWO_PI); ctx.fill();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  t+=0.016;

  // Layer 1: deep space
  drawNebulaWash();
  drawGalaxySmudge();
  drawStars();
  drawHorizon();

  // Layer 2: update + project + draw mesh
  for(let r=0;r<=rows;r++) for(let c=0;c<=cols;c++){
    const idx=r*(cols+1)+c;
    let target=(noise(c*0.18,r*0.22,t)*0.5+0.5)*MAX_H*0.48;
    if(mouse.inside){
      const ox=W*0.5,oy=H*0.70;
      const ix=(c-cols/2)*cellW+(r-rows/2)*cellW*0.5;
      const iy=(r-rows/2)*cellH*Math.cos(ISO_RAD);
      const sx=ox+ix+(c-cols/2)*cellH*0.28, sy=oy+iy;
      const dx=sx-mouse.x, dy=sy-mouse.y, dist2=dx*dx+dy*dy, rad=140;
      if(dist2<rad*rad) target+=Math.pow(1-Math.sqrt(dist2)/rad,2)*MAX_H*0.88;
    }
    targetHeights[idx]=target;
    heights[idx]=lerp(heights[idx],target,LERP_SPD);
  }
  project();
  drawMesh();
  drawVertices();

  // Layer 3: ground fog over mesh base
  drawFog();

  // Layer 4: interactive FX
  drawRings();

  // Layer 5: vignette + HUD
  drawVignette();
  drawHUD();

  requestAnimationFrame(draw);
}

card.addEventListener('mousemove',e=>{
  const rect=card.getBoundingClientRect();
  mouse.x=e.clientX-rect.left; mouse.y=e.clientY-rect.top;
});
card.addEventListener('mouseenter',()=>mouse.inside=true);
card.addEventListener('mouseleave',()=>{ mouse.inside=false; mouse.x=-9999; mouse.y=-9999; });
window.addEventListener('resize',resize);
resize(); draw();
</script>
</body>
</html>
